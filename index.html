    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <script>
        // Lógica para forçar recarregamento no Celular se houver nova versão
        (function() {
            const APP_VERSION = "20260305_0007"; // Timestamp da Versão
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                const storedVersion = localStorage.getItem('app_version');
                if (storedVersion !== APP_VERSION) {
                    localStorage.clear();
                    localStorage.setItem('app_version', APP_VERSION);
                    
                    // Adiciona um parâmetro de cache-buster na URL para forçar o servidor/browser a ignorar o cache
                    const url = new URL(window.location.href);
                    url.searchParams.set('v', APP_VERSION);
                    url.searchParams.set('t', Date.now());
                    window.location.replace(url.toString());
                }
            }
        })();
    </script>

<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 min-h-screen">

    <div id="root" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- O conteúdo será injetado via React/DOM -->
    </div>

    <!-- Modal para WhatsApp -->
    <div id="whatsapp-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999] hidden p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl space-y-6 max-w-sm w-full animate-fade-in">
            <h2 class="text-2xl font-bold text-primary dark:text-blue-400 uppercase text-center">Enviar WhatsApp</h2>

                        oninput="this.value = this.value.replace(/\D/g, '')"

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="confirmWhatsApp()" class="bg-green-600 text-white p-4 rounded-xl font-bold text-lg">OK</button>

    <script>
        // Prevenir restauração automática de scroll pelo navegador
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }

        // --- TÉCNICA JSONP GLOBAL ---
        let registroParaEditar = null; // Variável de Suporte
        window.ultimosRegistros = []; // Captura de Dados na Busca
        window.lastData = null;
        window.handleGoogleData = function(data) {
            let parsedData = data;
            if (typeof data === 'string') {
                try {
                    parsedData = JSON.parse(data);
                } catch (e) {
                    console.error("Erro ao processar JSON da string recebida:", e);
                }
            }
            window.lastData = parsedData;
        };

        // --- CONFIGURAÇÕES E CONSTANTES ---
        const DIRECT_URL = 'https://script.google.com/macros/s/AKfycbzn2NSn77z4nsNOyDSyfT5_YKBLimBdN4X1oVa0MSxJbpqIjFrCuJ4rwhpiRSyBrE1l/exec';
        let appVersionStr = "Carregando...";

        function calculateSEIDigit(base) {
            const digits = base.replace(/\D/g, '');
            if (digits.length < 9) return "";
            let sum = 0;
            const weights = [2, 3, 4, 5, 6, 7, 8, 9];
            const reversedDigits = digits.substring(0, 9).split('').reverse();
            for (let i = 0; i < reversedDigits.length; i++) {
                const weight = weights[i % weights.length];
                sum += parseInt(reversedDigits[i]) * weight;
            }
            const remainder = sum % 11;
            if (remainder < 2) return "0";
            return String(11 - remainder);
        }

        window.formatDateForInput = function(dateStr) {
            if (!dateStr) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch (e) {
                return '';
            }
        };

        window.handleProcessNumberKeydown = function(event) {
            const el = event.target;
            if (event.key === 'Backspace') {
                const pos = el.selectionStart;
                const val = el.value;
                // Se o cursor está logo após um separador, sinaliza para o oninput
                if (pos > 0 && (val[pos-1] === '.' || val[pos-1] === '-')) {
                    el.dataset.deleteSeparator = "true";
                } else {
                    el.dataset.deleteSeparator = "false";
                }
            }
        };

        window.handleProcessNumberInput = function(el, event) {
            let cursor = el.selectionStart;
            let val = el.value;
            
            let v = val.replace(/\D/g, '').substring(0, 10);
            
            // Se detectamos que o usuário apagou um separador, removemos o dígito anterior também
            if (el.dataset.deleteSeparator === "true") {
                v = v.substring(0, v.length - 1);
                el.dataset.deleteSeparator = "false";
            }

            // Técnica robusta para mobile: contar dígitos antes do cursor
            let digitsBefore = val.substring(0, cursor).replace(/\D/g, '').length;
            
            let r = '';
            if (v.length > 0) r += v.slice(0, 2);
            if (v.length > 2) r += '.' + v.slice(2, 3);
            if (v.length > 3) r += '.' + v.slice(3, 9);
            if (v.length > 9) r += '-' + v.slice(9, 10);
            
            el.value = r;
            
            // Reposicionar cursor baseado na contagem de dígitos
            let newPos = 0;
            let count = 0;
            while (count < digitsBefore && newPos < r.length) {
                if (/\d/.test(r[newPos])) count++;
                newPos++;
            }
            
            // Se acabou de digitar um número que precede um ponto/traço, pula o separador
            if (event && !event.inputType?.includes('delete')) {
                if (newPos < r.length && /\D/.test(r[newPos])) {
                    newPos++;
                }
            }

            el.setSelectionRange(newPos, newPos);

            const dateContainer = document.getElementById('reg-date-container');
            if (dateContainer) dateContainer.style.display = v.length > 0 ? 'block' : 'none';
            
            const errorEl = document.getElementById('reg-process-error');
            if (errorEl) {
                if (v.length === 10) {
                    const base = v.substring(0, 9);
                    const typed = v.substring(9, 10);
                    const calc = calculateSEIDigit(base);
                    if (typed !== calc) {
                        errorEl.innerText = '⚠️ Número do Processo Incorreto!';
                        errorEl.style.display = 'block';
                        el.classList.add('border-red-500');
                    } else {
                        errorEl.style.display = 'none';
                        el.classList.remove('border-red-500');
                    }
                } else {
                    errorEl.style.display = 'none';
                    el.classList.remove('border-red-500');
                }
            }
        };

        function openGoogleMaps() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
                }, (err) => {
                    alert("Erro ao obter localização: " + err.message);
                });
            } else {
                alert("Geolocalização não é suportada por este navegador.");
            }
        }

        function sendWhatsAppMessage() {
            const el = document.getElementById('wa-number');
            el.value = '';
            document.getElementById('whatsapp-modal').classList.remove('hidden');
            setTimeout(() => el.focus(), 100);
        }

        function closeWhatsAppModal() {
            document.getElementById('whatsapp-modal').classList.add('hidden');
        }

        function confirmWhatsApp() {
            const val = document.getElementById('wa-number').value;
            const cleaned = val.replace(/\D/g, '');
            if (!cleaned) {
                alert("Por favor, informe o número do WhatsApp.");
                return;
            }
            if (cleaned.length === 11) {
                window.open(`https://api.whatsapp.com/send?phone=55${cleaned}`);
                closeWhatsAppModal();
            } else {
                alert("Número incompleto! Por favor, informe os 11 dígitos (DDD + 9 + número).");
            }
        }

        async function getReverseGeocoding(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const data = await response.json();
                if (data && data.display_name) {
                    return data.display_name;
                }
                return `Lat: ${lat}, Lon: ${lon}`;
            } catch (e) {
                console.error("Erro no Geocoding:", e);
                return `Lat: ${lat}, Lon: ${lon}`;
            }
        }

        // --- ESTADO GLOBAL DO APLICATIVO ---
        let state = {
            screen: 'home',
            darkMode: false,
            currentTime: new Date(),
            registrations: [],
            consegs: [],
            loading: false,
            fetchError: false,
            isAdminAuthenticated: false,
            adminTab: 'registros',
            adminEditingConseg: null,
            filterPeriodStart: '',
            filterPeriodEnd: '',
            filterStatus: 'Todos', 
            filterConseg: '',
            ouvidoriaUser: '',
            ouvidoriaPass: '',
            ouvidoriaEditingId: null,
            ouvidoriaView: 'login',
            presidentView: 'login', 
            currentUser: null,
            formSubject: '',
            formConsegId: '',
            formProcessNumber: '',
            formProcessDate: '',
            formStatus: 'Aberto',
            ouvidoriaListFilterStatus: '',
            adminAttempts: 0,
            presidentAttempts: 0,
            adminPasswordSecret: null
        };

        // --- SEGURANÇA (Panic Mode Silencioso via API) ---
        function sendSecurityAlert() {
            const triggerAlert = (loc) => {
                const payload = {
                    type: 'security_alert',
                    payload: {
                      location: loc,
                      source: 'Tentativas de Login Admin Excedidas',
                      targetEmail: 'ConsegComasaEspinheiros@Gmail.com',
                      timestamp: new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })
                    }
                };

                fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                }).catch(err => console.log("Silent alert error:", err));
            };

            triggerAlert('Localização desativada');
        }

        // --- BUSCA DE VERSÃO AUTOMÁTICA ---
        function fetchAppVersion() {
            fetch(window.location.href, { method: 'HEAD' })
                .then(response => {
                    const lastModified = response.headers.get('Last-Modified');
                    if (lastModified) {
                        appVersionStr = new Date(lastModified).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
                        const verSpan = document.getElementById('appVersion');
                        if (verSpan) verSpan.innerText = appVersionStr;
                    } else {
                        appVersionStr = "Atualizado em " + new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
                    }
                })
                .catch(() => {
                    appVersionStr = "Versão Indisponível";
                });
        }

        // --- COMUNICAÇÃO JSONP ---
        let dataPollingInterval = null;

        function fetchDataJSONP(force = false) {
            if (!force && (state.ouvidoriaView === 'form' || state.adminEditingConseg || (state.screen === 'president' && state.presidentView === 'dashboard'))) {
                return;
            }

            state.loading = true;
            window.lastData = null; 
            render();

            const oldScript = document.getElementById('google-script-loader');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'google-script-loader';
            script.src = `${DIRECT_URL}?callback=handleGoogleData&t=${Date.now()}`;
            document.body.appendChild(script);

            const startTime = Date.now();
            if (dataPollingInterval) clearInterval(dataPollingInterval);

            return new Promise((resolve) => {
                dataPollingInterval = setInterval(() => {
                    if (window.lastData) {
                        processIncomingData(window.lastData);
                        clearInterval(dataPollingInterval);
                        state.loading = false;
                        state.fetchError = false;
                        render();
                        resolve();
                    }
                    if (Date.now() - startTime > 30000) {
                        clearInterval(dataPollingInterval);
                        state.loading = false;
                        state.fetchError = true;
                        render();
                        resolve();
                    }
                }, 500);
            });
        }

        function processIncomingData(data) {
            if (data && (data.adminPasswordSecret || data.ADMIN_PASSWORD_SECRET)) {
                state.adminPasswordSecret = String(data.adminPasswordSecret || data.ADMIN_PASSWORD_SECRET).trim();
            }

            if (data && data.consegs) {
                state.consegs = data.consegs.map(c => ({
                    id: c.id || '',
                    nome: c.nome || '',
                    senha: String(c.senha || ''),
                    ativo: String(c.ativo).toLowerCase() === 'true',
                    email: c.email || '',
                    agenda: c.agenda || ''
                }));
            }

            if (data && data.registrations) {
                const regs = data.registrations.map(r => ({
                    id: r.id || '',
                    userName: r.username || r.userName || '',
                    userPassword: r.userpassword || r.userPassword || '',
                    consegId: r.consegid || r.consegId || '',
                    subject: r.subject || '',
                    processNumber: r.processnumber || r.processNumber || '',
                    processDate: r.processdate || r.processDate || '',
                    status: r.status || 'Aberto',
                    createdAt: r.createdat || r.createdAt || new Date().toISOString(),
                    address: r.address || ''
                }));
                state.registrations = regs;
                window.ultimosRegistros = regs; 
            }
        }

        function setScreen(scr) { 
            state.screen = scr; 
            state.adminEditingConseg = null; 
            state.presidentView = 'login'; 
            state.filterStatus = 'Todos'; // Resetar filtros ao trocar de tela principal
            render(); 
            
            // Forçar o scroll para o topo de forma imediata e agressiva
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
            
            // Tentar usar scrollIntoView no container principal
            const root = document.getElementById('root');
            if (root) {
                root.scrollIntoView({ behavior: 'auto', block: 'start' });
            }
            
            // Tentar focar no header para forçar o browser a subir
            const header = document.querySelector('header');
            if (header) {
                header.setAttribute('tabindex', '-1');
                header.focus({ preventScroll: false });
            }

            // Repetir com múltiplos delays para garantir que o navegador processou a mudança de DOM e layout
            [50, 150, 300].forEach(delay => {
                setTimeout(() => {
                    window.scrollTo(0, 0);
                    document.documentElement.scrollTop = 0;
                    document.body.scrollTop = 0;
                    if (root) root.scrollIntoView({ behavior: 'auto', block: 'start' });
                }, delay);
            });
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.documentElement.classList.toggle('dark', state.darkMode);
            render();
        }

        function render() {
            const root = document.getElementById('root');
            const dateStr = state.currentTime.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = state.currentTime.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
            const formattedDate = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            let content = `
                <header class="text-center mb-8 animate-fade-in">
                    <div class="flex justify-between items-center mb-2">
                        <div class="w-10"></div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-primary dark:text-blue-400">Joinville Segura</h1>
                        <button onclick="toggleDarkMode()" class="p-3 rounded-full bg-gray-200 dark:bg-gray-700">
                            ${state.darkMode ? '☀️' : '🌙'}
                        </button>
                    </div>
                    <p class="text-xl md:text-2xl font-bold text-gray-700 dark:text-gray-300 text-center uppercase tracking-tighter">Sistema Comunitário de Segurança Pública</p>
                    <p class="text-lg font-bold text-gray-500 mt-2 text-center">${formattedDate} ${timeStr}</p>
                </header>
                
                <main id="app-main">
                    ${renderScreen()}
                </main>

                ${state.screen === 'home' ? renderFooter() : ''}
            `;

            root.innerHTML = content;
        }

        function renderScreen() {
            switch(state.screen) {
                case 'home': return renderHome();
                case 'ouvidoria': return renderOuvidoria();
                case 'emergencia': return renderEmergencia();
                case 'servicos': return renderServicos();
                case 'agenda': return renderAgenda();
                case 'admin': return renderAdmin();
                case 'president': return renderPresident();
                case 'about': return renderAbout();
                default: return renderHome();
            }
        }

        function renderHome() {
            const buttons = [
                { label: "Abrir OUVIDORIA na Prefeitura de Joinville (App Joinville Fácil)", color: "bg-blue-600", icon: "🏢", click: "window.open('https://oauthexternal.joinville.sc.gov.br/')" },
                { label: "Registrar no CONSEG a OUVIDORIA da Prefeitura de Joinville", color: "bg-indigo-600", icon: "📝", click: "setScreen('ouvidoria')" },
                { label: "Acessar o APP PMSC Cidadão da Polícia Militar", color: "bg-emerald-600", icon: "👮", click: "window.open('https://www.pm.sc.gov.br/')" },
                { label: "Registrar Boletim de Ocorrência (B.O.) na Polícia Civil", color: "bg-red-600", icon: "📑", click: "window.open('https://delegaciavirtual.sc.gov.br/')" },
                { label: "SINESP Cidadão (Consultar veículo pela placa)", color: "bg-yellow-600", icon: "🚗", click: "window.open('https://play.google.com/store/apps/details?id=br.gov.sinesp.cidadao.android')" },
                { label: "Polícia Científica (Obter IDENTIDADE)", color: "bg-slate-600", icon: "🆔", click: "window.open('https://www.policiacientifica.sc.gov.br/', '_blank')" },
                { label: "ÁGUAS DE JOINVILLE", color: "bg-sky-600", icon: "💧", click: "window.open('https://www.aguasdejoinville.com.br/', '_blank')" },
                { label: "CELESC (Energia Elétrica)", color: "bg-orange-600", icon: "⚡", click: "window.open('https://play.google.com/store/apps/details?id=br.com.celesc.app')" },
                { label: "Telefones de EMERGÊNCIA", color: "bg-rose-600", icon: "🚨", click: "setScreen('emergencia')" },
                { label: "Telefones de SERVIÇOS", color: "bg-teal-600", icon: "🛠️", click: "setScreen('servicos')" },
                { label: "Agenda do CONSEG", color: "bg-purple-600", icon: "📅", click: "setScreen('agenda')" },
                { label: "Inteligência Artificial ChatGPT", color: "bg-cyan-600", icon: "🤖", click: "window.open('https://chatgpt.com/')" },
                { label: "Descobrir minha Localização Aproximada", color: "bg-lime-600", icon: "📍", click: "openGoogleMaps()" },
                { label: "Enviar mensagem para um número WhatsApp", color: "bg-green-500", icon: "💬", click: "sendWhatsAppMessage()" }
            ];

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                    ${buttons.map(b => `
                        <button onclick="${b.click}" class="${b.color} text-white p-6 rounded-2xl shadow-xl flex items-center gap-4 text-left elderly-text min-h-[110px] hover:scale-[1.02] transition-transform">
                            <span class="text-4xl bg-white/20 p-2 rounded-xl">${b.icon}</span>
                            <span>${b.label}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderFooter() {
            return `
                <div class="mt-12 bg-gray-100 dark:bg-gray-800 p-6 rounded-3xl border-2 border-dashed border-gray-400 animate-fade-in">
                    <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-primary dark:text-blue-400">🛡️ Área Administrativa</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <button onclick="setScreen('president')" class="bg-slate-700 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-colors">Presidente de CONSEG</button>
                        <button onclick="setScreen('admin')" class="bg-slate-700 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-colors">Painel Admin</button>
                        <button onclick="window.close()" class="bg-red-900 text-white p-4 rounded-xl font-bold hover:bg-red-800 transition-colors">Sair do Aplicativo</button>
                    </div>
                </div>

        function handleAdminLogin() {
            const inputField = document.getElementById('admin-pass');
            if (!inputField) return;
            
            const passVal = String(inputField.value).trim();
            if (!passVal) {
                alert('Digite a senha');
                return;
            }
            
            // Validação com a senha vinda do backend (codigo.gs)
            const correctPass = state.adminPasswordSecret;
            
            if (!correctPass) {
                alert('Senha incorreta!');
                fetchDataJSONP(true);
                return;
            }

            if (passVal === correctPass) {
                state.isAdminAuthenticated = true;
                state.adminAttempts = 0;
                render();
                fetchDataJSONP();
            } else {
                state.adminAttempts++;
                if (state.adminAttempts >= 3) {
                    sendSecurityAlert();
                    state.adminAttempts = 0;
                }
                alert('Senha incorreta');
                inputField.value = '';
                inputField.focus();
            }
        }

        function handleSendEmail(id) {
            const c = state.consegs.find(con => String(con.id) === String(id));
            if (!c) return;
            const email = (c.email && c.email.trim() !== '') ? c.email : 'ConsegComasaEspinheiros@Gmail.com';
            const subject = encodeURIComponent('Para o Presidente do CONSEG ' + c.nome);
            const body = encodeURIComponent('Olá Presidente do ' + c.nome + ',\n\nGostaria de tratar sobre o seguinte assunto:\n\n');
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        function editConseg(id) {
            const c = state.consegs.find(con => String(con.id) === String(id));

        function saveNewConseg() {
            const nomeVal = document.getElementById('edit-nome').value;
            const emailVal = document.getElementById('edit-email').value;
            const senhaVal = document.getElementById('edit-senha').value;
            const agendaVal = document.getElementById('edit-agenda').value;
            const ativoVal = document.getElementById('edit-ativo').value === 'true';
            if (!nomeVal) { alert("O Nome do CONSEG é obrigatório!"); return; }
            const payload = { id: String(Date.now()), nome: nomeVal, email: emailVal, senha: String(senhaVal).trim(), agenda: agendaVal, ativo: ativoVal };
            state.loading = true; render();
            fetch(DIRECT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_conseg', payload }) })
            .then(() => {
                alert('Novo CONSEG cadastrado com sucesso!');
                state.adminEditingConseg = null;
                return fetchDataJSONP(true);
            }).then(() => render()).catch(() => { alert("Erro ao cadastrar."); state.loading = false; render(); });
        }

                                ${valid ? `
                                <div class="absolute top-4 right-4 flex flex-col gap-2">
                                    <button onclick="window.abrirEdicaoOuvidoria('${r.id}')" class="bg-blue-500 text-white p-4 rounded-xl shadow hover:bg-blue-600 transition-colors" title="Ajustar Registro">✏️</button>
                                    <button onclick="handleDeleteOuvidoria('${r.id}')" class="bg-red-500 text-white p-4 rounded-xl shadow hover:bg-red-600 transition-colors" title="Excluir">🗑️</button>
                                </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                    ${valid ? `
                        <button onclick="state.ouvidoriaView = 'form'; state.ouvidoriaEditingId = null; registroParaEditar = null; resetOuvidoriaForm(); render();" class="w-full p-5 bg-blue-600 text-white rounded-xl font-bold shadow-lg uppercase transition-transform active:scale-95">
                            + Incluir Novo Registro
                        </button>
                    ` : ''}
                    <button onclick="state.ouvidoriaView = 'login'; render();" class="w-full p-4 bg-gray-500 text-white rounded-xl font-bold">Voltar</button>
                </div>`;
            }

            if (state.ouvidoriaView === 'form') {
                 const isEdit = registroParaEditar !== null;
                 return `<div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl space-y-6 animate-fade-in">
                    <h2 class="text-2xl font-bold text-primary dark:text-blue-400 uppercase text-center">${isEdit ? '✏️ Editar Registro' : '➕ Novo Registro'}</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">CONSEG Destino</label>
                            <select id="form-conseg" class="w-full p-4 border rounded-xl font-bold dark:bg-gray-700">
                                <option value="">-- Selecione o CONSEG --</option>
                                ${state.consegs.filter(c => c.ativo).map(c => `<option value="${c.id}" ${registroParaEditar && c.id === registroParaEditar.consegId ? 'selected' : ''}>${c.nome}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Número do Processo</label>
                            <input type="text" id="reg-processNumber" maxlength="13" inputmode="numeric" 
                                value="${registroParaEditar ? registroParaEditar.processNumber : ''}"
                                onkeydown="window.handleProcessNumberKeydown(event)"
                                oninput="window.handleProcessNumberInput(this, event)" 
                                placeholder="99.9.999999-9" class="w-full p-4 border rounded-xl font-bold dark:bg-gray-700">
                            <p id="reg-process-error" class="text-red-500 text-[10px] font-bold mt-1" style="display: none;"></p>
                        </div>
                        <div id="reg-date-container" style="display: ${registroParaEditar && registroParaEditar.processNumber ? 'block' : 'none'};">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Data do Processo</label>
                            <input type="date" id="reg-processDate" value="${registroParaEditar ? window.formatDateForInput(registroParaEditar.processDate) : ''}" class="w-full p-4 border rounded-xl font-bold dark:bg-gray-700">
                        </div>
                        <div>
                            <label class="block text-[24px] font-bold text-gray-400 uppercase mb-1">Status</label>
                            <select id="reg-status" class="w-full p-4 border rounded-xl font-bold dark:bg-gray-700 text-[24px]">
                                <option value="Aberto" ${registroParaEditar && registroParaEditar.status === 'Aberto' ? 'selected' : ''}>Aberto</option>
                                <option value="Em andamento" ${registroParaEditar && registroParaEditar.status === 'Em andamento' ? 'selected' : ''}>Em andamento</option>
                                <option value="Solucionado" ${registroParaEditar && registroParaEditar.status === 'Solucionado' ? 'selected' : ''}>Solucionado</option>
                                <option value="Fechado" ${registroParaEditar && registroParaEditar.status === 'Fechado' ? 'selected' : ''}>Fechado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Assunto / Descrição</label>
                            <textarea id="form-subject" placeholder="Descreva o que aconteceu..." class="w-full p-4 border rounded-xl font-bold dark:bg-gray-700 h-32">${registroParaEditar ? registroParaEditar.subject : ''}</textarea>
                        </div>
                        <button onclick="handleSaveNewRegistration(event)" class="w-full p-5 bg-green-600 text-white rounded-xl font-bold text-xl shadow-lg transition-transform active:scale-95">Salvar Registro</button>
                        <button onclick="state.ouvidoriaView = 'list'; registroParaEditar = null; state.ouvidoriaEditingId = null; render();" class="w-full p-4 bg-gray-500 text-white rounded-xl font-bold">Cancelar</button>
                    </div>
                </div>`;
            }
        }

        function resetOuvidoriaForm() {
            state.formConsegId = '';
            state.formSubject = '';
            state.formProcessNumber = '';
            state.formProcessDate = '';
            state.formStatus = 'Aberto';
        }

        async function handleDeleteOuvidoria(id) {
            if (!confirm("Tem certeza que deseja excluir este registro permanentemente?")) return;
            state.registrations = state.registrations.filter(r => String(r.id) !== String(id));
            render();
            try {
                await fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: 'delete_registration', payload: { id } })
                });
            } catch (e) {
                console.error("Erro ao excluir registro:", e);
                fetchDataJSONP(true);
            }
        }

        async function handleSaveNewRegistration(event) {
            if (event) event.preventDefault(); 
            const consegId = document.getElementById('form-conseg').value;
            const subject = document.getElementById('form-subject').value;
            const processNumber = document.getElementById('reg-processNumber').value;
            const processDate = document.getElementById('reg-processDate').value;
            const status = document.getElementById('reg-status').value;
            
            if (!consegId || !subject) {
                alert("Preencha todos os campos obrigatórios (CONSEG e Assunto)!");
                return;
            }

            if (processNumber) {
                const digits = processNumber.replace(/\D/g, '');
                if (digits.length === 10) {
                    const base = digits.substring(0, 9);
                    const typedDigit = digits.substring(9, 10);
                    const calculatedDigit = calculateSEIDigit(base);
                    if (typedDigit !== calculatedDigit) {
                        alert(`⚠️ O número do processo está incorreto.`);
                        return;
                    }
                } else if (digits.length > 0 && digits.length < 10) {
                    alert("O número do processo SEI deve ter 10 dígitos (incluindo o dígito verificador).");
                    return;
                }
            }

            const isUpdate = registroParaEditar !== null;
            const finalId = isUpdate ? registroParaEditar.id : String(Date.now());

            let address = '';
            if (!isUpdate && navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                    });
                    address = await getReverseGeocoding(pos.coords.latitude, pos.coords.longitude);
                } catch (e) {
                    console.warn("Não foi possível obter localização:", e);
                }
            } else if (isUpdate) {
                address = registroParaEditar.address || '';
            }

            // Rigorous order for spreadsheet columns A-J:
            // 1.ID, 2.Nome, 3.Senha, 4.ID Conseg, 5.Assunto, 6.Número Processo, 7.Data Processo, 8.Status, 9.CreatedAt, 10.Address
            const serverPayload = {
                id: finalId, 
                userName: state.ouvidoriaUser,
                userPassword: state.ouvidoriaPass,
                consegId: consegId,
                subject: subject,
                processNumber: processNumber,
                processDate: processDate,
                status: status,
                createdAt: isUpdate ? registroParaEditar.createdAt : new Date().toISOString(),
                address: address
            };

            const localPayload = {
                ...serverPayload
            };

            if (isUpdate) {
                const idx = state.registrations.findIndex(r => String(r.id) === String(finalId));
                if (idx !== -1) {
                    state.registrations[idx] = { ...localPayload };
                }
            } else {
                state.registrations.unshift(localPayload);
            }

            state.ouvidoriaView = 'list';
            
            registroParaEditar = null;
            state.ouvidoriaEditingId = null;
            resetOuvidoriaForm();
            render(); 

            const type = isUpdate ? 'update_registration' : 'registration';
            fetch(DIRECT_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ type: type, payload: serverPayload }) 
            })
            .then(() => fetchDataJSONP(true))
            .catch((err) => console.error("Erro no salvamento em background:", err));
        }

        function handleOuvidoriaLogin(view) { if (isOuvidoriaValid()) { state.ouvidoriaView = view; render(); fetchDataJSONP(); } }

        function getStatusBadgeClass(status) {
            const s = String(status).toLowerCase();
            if (s === 'aberto' || s === 'pendente') return 'bg-yellow-400 text-black';
            if (s === 'em andamento') return 'bg-blue-600 text-white';
            if (s === 'solucionado') return 'bg-green-600 text-white';
            if (s === 'fechado' || s === 'concluído') return 'bg-gray-500 text-white';
            return 'bg-gray-200 text-gray-700';
        }

        function renderAdminRegistros() {
            if (state.loading) {
                return `
                    <div class="flex flex-col items-center justify-center py-20 space-y-4 animate-pulse">
                        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-lg font-bold text-gray-500 uppercase tracking-widest">Carregando registros...</p>
                        <p class="text-xs text-gray-400">Isso pode levar alguns segundos...</p>
                    </div>
                `;
            }

            if (state.fetchError && state.registrations.length === 0) {
                return `
                    <div class="bg-red-50 border-2 border-red-200 p-8 rounded-2xl text-center space-y-4">
                        <p class="text-red-600 font-bold text-lg">⚠️ Erro ao carregar dados</p>
                        <p class="text-sm text-red-500">Não foi possível conectar ao servidor do Google. Verifique sua conexão ou tente novamente.</p>
                        <button onclick="fetchDataJSONP(true)" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Tentar Novamente</button>
                    </div>
                `;
            }

            let filtered = [...state.registrations];
            if (state.filterStatus && state.filterStatus !== 'Todos') {
                filtered = filtered.filter(r => r.status === state.filterStatus);
            }
            if (state.filterConseg) {
                filtered = filtered.filter(r => String(r.consegId) === String(state.filterConseg));
            }
            if (state.filterPeriodStart) {
                const start = new Date(state.filterPeriodStart + 'T00:00:00').getTime();
                filtered = filtered.filter(r => new Date(r.createdAt).setHours(0,0,0,0) >= start);
            }
            if (state.filterPeriodEnd) {
                const end = new Date(state.filterPeriodEnd + 'T23:59:59').getTime();
                filtered = filtered.filter(r => new Date(r.createdAt).getTime() <= end);
            }

            filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            window.ultimosRegistros = filtered;
            const filteredIds = filtered.map(r => String(r.id));

            // --- LÓGICA DE CÁLCULO DO RESUMO DE STATUS PARA O ADMIN ---
            const stats = {
                total: filtered.length,
                aberto: filtered.filter(r => r.status === 'Aberto').length,
                andamento: filtered.filter(r => r.status === 'Em andamento').length,
                solucionado: filtered.filter(r => r.status === 'Solucionado').length,
                fechado: filtered.filter(r => r.status === 'Fechado').length
            };

            if (filtered.length === 0) return `
                <div class="space-y-4">
                    <!-- PAINEL DE RESUMO COM BADGES COLORIDOS -->
                    <div class="flex flex-wrap gap-2 mb-2 animate-fade-in">
                        <div class="bg-blue-100 text-blue-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Total: ${stats.total}</div>
                        <div class="bg-red-100 text-red-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Aberto: ${stats.aberto}</div>
                        <div class="bg-yellow-100 text-yellow-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Andamento: ${stats.andamento}</div>
                        <div class="bg-green-100 text-green-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Solucionado: ${stats.solucionado}</div>
                        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Fechado: ${stats.fechado}</div>
                    </div>
                    <p class="bg-blue-100 text-blue-800 p-2 rounded-lg text-center font-bold text-xs uppercase tracking-wide">Total: 0 registros encontrados</p>
                    <p class="text-center py-10 font-bold text-gray-500">Nenhum registro encontrado no sistema.</p>
                </div>`;

            return `
                <div class="space-y-4 animate-fade-in">
                    <!-- PAINEL DE RESUMO COM BADGES COLORIDOS -->
                    <div class="flex flex-wrap gap-2 mb-2 animate-fade-in">
                        <div class="bg-blue-100 text-blue-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Total: ${stats.total}</div>
                        <div class="bg-red-100 text-red-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Aberto: ${stats.aberto}</div>
                        <div class="bg-yellow-100 text-yellow-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Andamento: ${stats.andamento}</div>
                        <div class="bg-green-100 text-green-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Solucionado: ${stats.solucionado}</div>
                        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Fechado: ${stats.fechado}</div>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
                        <p class="bg-blue-100 text-blue-800 p-2 rounded-lg text-center font-bold text-xs uppercase tracking-wide flex-1 w-full">Total: ${filtered.length} registros encontrados</p>
                        <button onclick="window.handleDeleteAdminFiltered('${filteredIds.join(',')}')" class="w-full sm:w-auto bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-red-700 shadow transition-all admin-filter-input flex items-center justify-center gap-2">
                            🗑️ Excluir todos os ${filtered.length} registros filtrados
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left border-collapse bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md">
                            <thead class="bg-gray-100 dark:bg-gray-700">
                                <tr>
                                    <th class="p-3 border font-bold">Data</th>
                                    <th class="p-3 border font-bold">Nome</th>
                                    <th class="p-3 border font-bold">Assunto / Endereço</th>
                                    <th class="p-3 border font-bold">Status</th>
                                    <th class="p-3 border font-bold">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.map(r => {
                                    try {
                                        return `
                                            <tr class="border-b hover:bg-gray-50 dark:hover:bg-gray-750">
                                                <td class="p-3 border">
                                                    <div class="font-bold">${new Date(r.createdAt).toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' })}</div>
                                                    <div class="text-[10px] text-gray-400 italic">ID: ${String(r.id).slice(-6)}</div>
                                                </td>
                                                <td class="p-3 border">
                                                    <div class="font-bold">${r.userName || 'Usuário'}</div>
                                                    <div class="text-[10px] text-gray-400">(${state.consegs.find(c => String(c.id) === String(r.consegId))?.nome || 'Sem CONSEG'})</div>
                                                </td>
                                                <td class="p-3 border">
                                                    <div class="line-clamp-2 font-bold">${r.subject || 'Sem assunto'}</div>
                                                    ${r.address ? `<div class="text-[10px] text-emerald-600 font-bold mt-1">📍 ${r.address}</div>` : ''}
                                                    ${r.processNumber ? `<div class="text-[10px] font-bold text-primary">Proc: ${r.processNumber}</div>` : ''}
                                                </td>
                                                <td class="p-3 border">
                                                    <select onchange="window.handleUpdateStatus('${r.id}', this.value)" class="p-1 border rounded text-[12px] font-bold dark:bg-gray-600 outline-none w-full no-elderly">
                                                        <option value="Aberto" ${r.status === 'Aberto' ? 'selected' : ''}>ABERTO</option>
                                                        <option value="Em andamento" ${r.status === 'Em andamento' ? 'selected' : ''}>EM ANDAMENTO</option>
                                                        <option value="Solucionado" ${r.status === 'Solucionado' ? 'selected' : ''}>SOLUCIONADO</option>
                                                        <option value="Fechado" ${r.status === 'Fechado' ? 'selected' : ''}>FECHADO</option>
                                                    </select>
                                                </td>
                                                <td class="p-3 border">
                                                    <div class="flex gap-2">
                                                        <button onclick="alert('📝 Assunto Completo:\\n\\n${ (r.subject || 'Sem assunto').replace(/'/g, "\\'").replace(/\n/g, "\\n") }')" class="bg-amber-100 text-amber-700 p-2 rounded-lg shadow hover:bg-amber-200 transition-colors" title="Ver Assunto Completo">👁️</button>
                                                        <button onclick="window.handleDeleteAdminIndividual('${r.id}')" class="bg-red-500 text-white p-2 rounded-lg shadow hover:bg-red-600 transition-colors" title="Excluir">🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `;
                                    } catch (e) {
                                        console.error("Erro ao renderizar registro:", e, r);
                                        return "";
                                    }
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function getStatusBorderClass(status) { if (status === 'Pendente' || status === 'Aberto') return 'status-border-pendente'; if (status === 'Em andamento' || status === 'Em Andamento') return 'status-border-andamento'; if (status === 'Concluído' || status === 'Solucionado' || status === 'Fechado') return 'status-border-concluido'; return 'border-gray-300'; }

        window.handleDeleteAdminIndividual = async function(id) {
            if (!confirm('Deseja realmente excluir este registro?')) return;
            state.registrations = state.registrations.filter(r => String(r.id) !== String(id));
            render();
            try {
                await fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: 'delete_registration', payload: { id: id } })
                });
            } catch (e) {
                console.error(e);
                fetchDataJSONP(true);
            }
        };

        window.handleDeleteAdminFiltered = async function(idsString) {
            const ids = idsString.split(',');
            if (ids.length === 0 || ids[0] === "") return;
            if (!confirm(`VOCÊ ESTÁ PRESTES A EXCLUIR TODOS OS ${ids.length} REGISTROS FILTRADOS. Confirma?`)) return;
            if (!confirm(`ESSA AÇÃO É IRREVERSÍVEL. Confirmar exclusão em massa?`)) return;
            state.registrations = state.registrations.filter(r => !ids.includes(String(r.id)));
            render();
            for (const id of ids) {
                try {
                    fetch(DIRECT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ type: 'delete_registration', payload: { id: id } })
                    });
                } catch (e) {}
            }
            setTimeout(() => fetchDataJSONP(true), 1000);
        };

        setInterval(() => { state.currentTime = new Date(); if (state.screen === 'home') render(); }, 60000);
        setInterval(() => fetchDataJSONP(), 120000);
        fetchAppVersion();
        fetchDataJSONP(); render();

        window.showRegistrationDetails = function(id) {
            const r = state.registrations.find(reg => String(reg.id) === String(id));
            if (r) {
                const addressInfo = state.isAdminAuthenticated ? `\nEndereço: ${r.address || 'Não capturado'}` : '';
                alert(`DETALHES DO REGISTRO\n\nStatus: ${r.status}\nData: ${new Date(r.createdAt).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}\nUsuário: ${r.userName}\nAssunto: ${r.subject}${addressInfo}\n\nProcesso: ${r.processNumber || 'N/A'}`);
            }
        };

        window.handleUpdateStatus = async function(id, newStatus) {
            const reg = state.registrations.find(r => String(r.id) === String(id));
            if (!reg) return;
            
            const oldStatus = reg.status;
            reg.status = newStatus;
            reg.updatedAt = new Date().toISOString();
            render();
            
            try {
                // Rigorous order for spreadsheet columns A-J:
                // 1.ID, 2.Nome, 3.Senha, 4.ID Conseg, 5.Assunto, 6.Número Processo, 7.Data Processo, 8.Status, 9.CreatedAt, 10.Address
                const serverPayload = {
                    id: reg.id,
                    userName: reg.userName,
                    userPassword: reg.userPassword,
                    consegId: reg.consegId,
                    subject: reg.subject,
                    processNumber: reg.processNumber,
                    processDate: reg.processDate,
                    status: reg.status,
                    createdAt: reg.createdAt,
                    address: reg.address
                };

                const response = await fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ 
                        type: 'update_registration', 
                        payload: serverPayload 
                    })
                });
                // Como é no-cors ou similar, podemos não ter resposta legível, mas o comando foi enviado.
            } catch (e) {
                console.error("Erro ao atualizar status:", e);
                alert("Erro ao sincronizar alteração. Tentando recuperar...");
                fetchDataJSONP(true);
            }
        };

        window.abrirEdicaoOuvidoria = function(id) {
          const reg = state.registrations.find(r => String(r.id) === String(id));
          if (!reg) return;
          registroParaEditar = reg; 
          state.ouvidoriaView = 'form';
          state.ouvidoriaEditingId = id; 
          if (state.screen === 'admin') {
              state.ouvidoriaUser = reg.userName;
              state.ouvidoriaPass = reg.userPassword;
          }
          render();
          let tentativas = 0;
          const checkExist = setInterval(function() {
            const campoAssunto = document.getElementById('form-subject');
            if (campoAssunto) {
              campoAssunto.value = reg.subject || '';
              const procNum = document.getElementById('reg-processNumber');
              const procDate = document.getElementById('reg-processDate');
              const statusField = document.getElementById('reg-status');
              const consegField = document.getElementById('form-conseg');
              if (procNum) procNum.value = reg.processNumber || '';
              if (procDate) procDate.value = window.formatDateForInput(reg.processDate);
              if (statusField) statusField.value = reg.status || 'Aberto';
              if (consegField) consegField.value = reg.consegId || '';
              if(reg.processNumber) {
                  const container = document.getElementById('reg-date-container');
                  if (container) container.style.display = 'block';
              }
              clearInterval(checkExist);
            }
            if (++tentativas > 20) clearInterval(checkExist);
          }, 100);
        };
    </script>
</body>
</html>
