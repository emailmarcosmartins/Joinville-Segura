<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004080">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joinville Segura</title>
    <!-- Tailwind CSS para o visual moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .elderly-text { font-size: 1.25rem; line-height: 1.75rem; font-weight: 700; }
        input, select, textarea { font-size: 1.25rem !important; font-weight: 600 !important; }
        button { transition: all 0.2s; }
        button:active { transform: scale(0.95); }
        .scroll-hidden::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Estilos de borda por status */
        .status-border-pendente { border-left-color: #ef4444 !important; } /* Vermelho */
        .status-border-andamento { border-left-color: #f59e0b !important; } /* Amarelo */
        .status-border-concluido { border-left-color: #10b981 !important; } /* Verde */
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        /* Ajustes Mobile conforme solicitado (44px altura mínima) */
        .admin-filter-input {
            min-height: 44px;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 min-h-screen">

    <div id="root" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- O conteúdo será injetado via React/DOM -->
    </div>

    <script>
        // --- TÉCNICA JSONP GLOBAL ---
        let registroParaEditar = null; // Variável de Suporte
        window.ultimosRegistros = []; // Captura de Dados na Busca
        window.lastData = null;
        window.handleGoogleData = function(data) {
            let parsedData = data;
            if (typeof data === 'string') {
                try {
                    parsedData = JSON.parse(data);
                } catch (e) {
                    console.error("Erro ao processar JSON da string recebida:", e);
                }
            }
            window.lastData = parsedData;
        };

        // --- CONFIGURAÇÕES E CONSTANTES ---
        const DIRECT_URL = 'https://script.google.com/macros/s/AKfycbzn2NSn77z4nsNOyDSyfT5_YKBLimBdN4X1oVa0MSxJbpqIjFrCuJ4rwhpiRSyBrE1l/exec';
        let appVersionStr = "Carregando...";

        // --- ESTADO GLOBAL DO APLICATIVO ---
        let state = {
            screen: 'home',
            darkMode: false,
            currentTime: new Date(),
            registrations: [],
            consegs: [],
            loading: false,
            fetchError: false,
            isAdminAuthenticated: false,
            adminTab: 'registros',
            adminEditingConseg: null,
            filterPeriodStart: '',
            filterPeriodEnd: '',
            filterStatus: 'Todos', 
            filterConseg: '',
            ouvidoriaUser: '',
            ouvidoriaPass: '',
            ouvidoriaEditingId: null,
            ouvidoriaView: 'login',
            presidentView: 'login', 
            currentUser: null,
            formSubject: '',
            formConsegId: '',
            formProcessNumber: '',
            formProcessDate: '',
            formStatus: 'Aberto',
            ouvidoriaListFilterStatus: '',
            adminAttempts: 0,
            presidentAttempts: 0
        };

        // --- SEGURANÇA (Panic Mode Silencioso via API) ---
        function sendSecurityAlert() {
            const triggerAlert = (loc) => {
                const payload = {
                    type: 'security_alert',
                    payload: {
                      location: loc,
                      source: 'Tentativas de Login Admin Excedidas',
                      targetEmail: 'ConsegComasaEspinheiros@Gmail.com',
                      timestamp: new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })
                    }
                };

                fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                }).catch(err => console.log("Silent alert error:", err));
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => triggerAlert(`${pos.coords.latitude},${pos.coords.longitude}`),
                    () => triggerAlert('Localização negada/indisponível'),
                    { timeout: 10000, enableHighAccuracy: true }
                );
            } else {
                triggerAlert('Geolocalização não suportada');
            }
        }

        // --- BUSCA DE VERSÃO AUTOMÁTICA ---
        function fetchAppVersion() {
            fetch(window.location.href, { method: 'HEAD' })
                .then(response => {
                    const lastModified = response.headers.get('Last-Modified');
                    if (lastModified) {
                        appVersionStr = new Date(lastModified).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
                        const verSpan = document.getElementById('appVersion');
                        if (verSpan) verSpan.innerText = appVersionStr;
                    } else {
                        appVersionStr = "Atualizado em " + new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
                    }
                })
                .catch(() => {
                    appVersionStr = "Versão Indisponível";
                });
        }

        // --- COMUNICAÇÃO JSONP ---
        let dataPollingInterval = null;

        function fetchDataJSONP(force = false) {
            if (!force && (state.ouvidoriaView === 'form' || state.adminEditingConseg || (state.screen === 'president' && state.presidentView === 'dashboard'))) {
                return;
            }

            state.loading = true;
            window.lastData = null; 
            render();

            const oldScript = document.getElementById('google-script-loader');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'google-script-loader';
            script.src = `${DIRECT_URL}?callback=handleGoogleData&t=${Date.now()}`;
            document.body.appendChild(script);

            const startTime = Date.now();
            if (dataPollingInterval) clearInterval(dataPollingInterval);

            return new Promise((resolve) => {
                dataPollingInterval = setInterval(() => {
                    if (window.lastData) {
                        processIncomingData(window.lastData);
                        clearInterval(dataPollingInterval);
                        state.loading = false;
                        state.fetchError = false;
                        render();
                        resolve();
                    }
                    if (Date.now() - startTime > 30000) {
                        clearInterval(dataPollingInterval);
                        state.loading = false;
                        state.fetchError = true;
                        render();
                        resolve();
                    }
                }, 500);
            });
        }

        function processIncomingData(data) {
            if (data && data.consegs) {
                state.consegs = data.consegs.map(c => ({
                    id: c.id || '',
                    nome: c.nome || '',
                    senha: String(c.senha || ''),
                    ativo: String(c.ativo).toLowerCase() === 'true',
                    email: c.email || '',
                    agenda: c.agenda || ''
                }));
            }

            if (data && data.registrations) {
                const regs = data.registrations.map(r => ({
                    id: r.id || '',
                    userName: r.username || r.userName || '',
                    userPassword: r.userpassword || r.userPassword || '',
                    consegId: r.consegid || r.consegId || '',
                    subject: r.subject || '',
                    processNumber: r.processnumber || r.processNumber || '',
                    processDate: r.processdate || r.processDate || '',
                    status: r.status || 'Aberto',
                    createdAt: r.createdat || r.createdAt || new Date().toISOString(),
                    updatedAt: r.updatedat || r.updatedAt || r.createdAt || r.createdat || new Date().toISOString(),
                    latitude: r.latitude || null,
                    longitude: r.longitude || null
                }));
                state.registrations = regs;
                window.ultimosRegistros = regs; 
            }
        }

        function setScreen(scr) { 
            state.screen = scr; 
            state.adminEditingConseg = null; 
            state.presidentView = 'login'; 
            render(); 
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.documentElement.classList.toggle('dark', state.darkMode);
            render();
        }

        function render() {
            const root = document.getElementById('root');
            const dateStr = state.currentTime.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = state.currentTime.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
            const formattedDate = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            let content = `
                <header class="text-center mb-8 animate-fade-in">
                    <div class="flex justify-between items-center mb-2">
                        <div class="w-10"></div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-primary dark:text-blue-400">Joinville Segura</h1>
                        <button onclick="toggleDarkMode()" class="p-3 rounded-full bg-gray-200 dark:bg-gray-700">
                            ${state.darkMode ? '☀️' : '🌙'}
                        </button>
                    </div>
                    <p class="text-xl md:text-2xl font-bold text-gray-700 dark:text-gray-300 text-center uppercase tracking-tighter">Sistema Comunitário de Segurança Pública</p>
                    <p class="text-lg font-bold text-gray-500 mt-2 text-center">${formattedDate} ${timeStr}</p>
                </header>
                
                <main id="app-main">
                    ${renderScreen()}
                </main>

                ${state.screen === 'home' ? renderFooter() : ''}
            `;

            root.innerHTML = content;
        }

        function renderScreen() {
            switch(state.screen) {
                case 'home': return renderHome();
                case 'ouvidoria': return renderOuvidoria();
                case 'emergencia': return renderEmergencia();
                case 'servicos': return renderServicos();
                case 'agenda': return renderAgenda();
                case 'admin': return renderAdmin();
                case 'president': return renderPresident();
                default: return renderHome();
            }
        }

        function renderHome() {
            const buttons = [
                { label: "Abrir OUVIDORIA na Prefeitura de Joinville (App Joinville Fácil)", color: "bg-blue-600", icon: "🏢", click: "window.open('https://oauthexternal.joinville.sc.gov.br/')" },
                { label: "Registrar no CONSEG a OUVIDORIA da Prefeitura de Joinville", color: "bg-indigo-600", icon: "📝", click: "setScreen('ouvidoria')" },
                { label: "Acessar o APP PMSC Cidadão da Polícia Militar", color: "bg-emerald-600", icon: "👮", click: "window.open('https://www.pm.sc.gov.br/')" },
                { label: "Registrar Boletim de Ocorrência (B.O.) na Polícia Civil", color: "bg-red-600", icon: "📑", click: "window.open('https://delegaciavirtual.sc.gov.br/')" },
                { label: "SINESP Cidadão (Consultar veículo pela placa)", color: "bg-yellow-600", icon: "🚗", click: "window.open('https://play.google.com/store/apps/details?id=br.gov.sinesp.cidadao.android')" },
                { label: "Polícia Científica (Obter IDENTIDADE)", color: "bg-slate-600", icon: "🆔", click: "window.open('https://www.policiacientifica.sc.gov.br/', '_blank')" },
                { label: "ÁGUAS DE JOINVILLE", color: "bg-sky-600", icon: "💧", click: "window.open('https://www.aguasdejoinville.com.br/', '_blank')" },
                { label: "CELESC (Energia Elétrica)", color: "bg-orange-600", icon: "⚡", click: "window.open('https://play.google.com/store/apps/details?id=br.com.celesc.app')" },
                { label: "Telefones de EMERGÊNCIA", color: "bg-rose-600", icon: "🚨", click: "setScreen('emergencia')" },
                { label: "Telefones de SERVIÇOS", color: "bg-teal-600", icon: "🛠️", click: "setScreen('servicos')" },
                { label: "Agenda do CONSEG", color: "bg-purple-600", icon: "📅", click: "setScreen('agenda')" },
                { label: "Inteligência Artificial ChatGPT", color: "bg-cyan-600", icon: "🤖", click: "window.open('https://chatgpt.com/')" }
            ];

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                    ${buttons.map(b => `
                        <button onclick="${b.click}" class="${b.color} text-white p-6 rounded-2xl shadow-xl flex items-center gap-4 text-left elderly-text min-h-[110px] hover:scale-[1.02] transition-transform">
                            <span class="text-4xl bg-white/20 p-2 rounded-xl">${b.icon}</span>
                            <span>${b.label}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderFooter() {
            return `
                <div class="mt-12 bg-gray-100 dark:bg-gray-800 p-6 rounded-3xl border-2 border-dashed border-gray-400 animate-fade-in">
                    <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-primary dark:text-blue-400">🛡️ Área Administrativa</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <button onclick="setScreen('president')" class="bg-slate-700 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-colors">Presidente de CONSEG</button>
                        <button onclick="setScreen('admin')" class="bg-slate-700 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-colors">Painel Admin</button>
                        <button onclick="window.close()" class="bg-red-900 text-white p-4 rounded-xl font-bold hover:bg-red-800 transition-colors">Sair do Aplicativo</button>
                    </div>
                </div>
                
                <footer class="mt-8 pt-8 border-t text-center space-y-4 animate-fade-in">
                    <div class="flex flex-col gap-2 items-center">
                        <a href="https://cepcc.ssp.sc.gov.br/" target="_blank" class="text-sm font-bold text-blue-700 dark:text-blue-400 hover:underline">Saiba mais sobre os CONSEGs em cepcc.ssp.sc.gov.br</a>
                        <a href="mailto:ConsegComasaEspinheiros@Gmail.com" class="text-sm font-bold text-blue-700 dark:text-blue-400 hover:underline">Reportar um problema com este aplicativo</a>
                    </div>
                    
                    <p class="text-lg font-bold text-gray-600 dark:text-gray-400 px-4">Este aplicativo "Joinville Segura" foi idealizado por Marcos Roberto Martins - Membro do Conselho Comunitário de Segurança CONSEG Comasa e Espinheiros desde 2017.</p>
                    
                    <p class='text-[10px] text-gray-400 mt-4 uppercase tracking-widest'>Versão: <span id='appVersion'>${appVersionStr}</span></p>
                </footer>
            `;
        }

        function renderAdmin() {
            if (!state.isAdminAuthenticated) {
                return `
                    <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl space-y-6 max-w-md mx-auto animate-fade-in mt-10">
                        <h2 class="text-3xl font-bold text-center text-primary dark:text-blue-400">Painel Administrativo</h2>
                        <input type="password" id="admin-pass" placeholder="Senha do Sistema" class="w-full p-4 border rounded-xl dark:bg-gray-700 font-bold text-2xl" onkeyup="if(event.key==='Enter') handleAdminLogin()">
                        <button onclick="handleAdminLogin()" class="w-full p-5 bg-slate-700 text-white rounded-xl font-bold text-2xl shadow-lg">Entrar</button>
                        <button onclick="setScreen('home')" class="w-full p-4 text-gray-500 font-bold text-lg">Voltar à Home</button>
                    </div>
                `;
            }

            return `
                <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center border-b pb-4">
                        <h2 class="text-3xl font-extrabold text-primary dark:text-blue-400">Painel Administrativo</h2>
                        <div class="flex gap-2">
                            <button onclick="fetchDataJSONP(true)" class="bg-blue-500 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                                🔄 Atualizar
                            </button>
                            <button onclick="state.isAdminAuthenticated = false; setScreen('home');" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-sm">Sair</button>
                        </div>
                    </div>
                    <div class="flex bg-gray-100 dark:bg-gray-700 p-2 rounded-2xl gap-2">
                        <button onclick="state.adminTab = 'registros'; render();" class="flex-1 p-4 rounded-xl font-bold ${state.adminTab === 'registros' ? 'bg-white shadow text-primary' : 'text-gray-500'}">📋 Registros</button>
                        <button onclick="state.adminTab = 'consegs'; render();" class="flex-1 p-4 rounded-xl font-bold ${state.adminTab === 'consegs' ? 'bg-white shadow text-primary' : 'text-gray-500'}">🛡️ CONSEGs</button>
                    </div>
                    ${state.adminTab === 'registros' ? renderAdminFilters() + renderAdminRegistros() : renderAdminConsegs()}
                    <button onclick="setScreen('home')" class="w-full p-5 bg-gray-500 text-white rounded-xl font-bold text-xl">Voltar ao Menu</button>
                </div>
            `;
        }

        function renderAdminFilters() {
            return `
                <div class="p-5 bg-gray-50 dark:bg-gray-700 rounded-2xl border border-dashed border-gray-300 space-y-4">
                    <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Filtros de Busca Avançada</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Status</label>
                            <select onchange="state.filterStatus = this.value; render();" class="w-full p-2 border rounded-lg font-bold text-sm dark:bg-gray-600 admin-filter-input">
                                <option value="Todos" ${state.filterStatus === 'Todos' ? 'selected' : ''}>Todos</option>
                                <option value="Aberto" ${state.filterStatus === 'Aberto' ? 'selected' : ''}>Aberto</option>
                                <option value="Em andamento" ${state.filterStatus === 'Em andamento' ? 'selected' : ''}>Em andamento</option>
                                <option value="Solucionado" ${state.filterStatus === 'Solucionado' ? 'selected' : ''}>Solucionado</option>
                                <option value="Fechado" ${state.filterStatus === 'Fechado' ? 'selected' : ''}>Fechado</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">CONSEG</label>
                            <select onchange="state.filterConseg = this.value; render();" class="w-full p-2 border rounded-lg font-bold text-sm dark:bg-gray-600 admin-filter-input">
                                <option value="">Todos os CONSEGs</option>
                                ${state.consegs.map(c => `<option value="${c.id}" ${String(state.filterConseg) === String(c.id) ? 'selected' : ''}>${c.nome}</option>`).join('')}
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Período De</label>
                            <input type="date" value="${state.filterPeriodStart}" onchange="state.filterPeriodStart = this.value; render();" class="w-full p-2 border rounded-lg text-sm dark:bg-gray-600 admin-filter-input">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Período Até</label>
                            <input type="date" value="${state.filterPeriodEnd}" onchange="state.filterPeriodEnd = this.value; render();" class="w-full p-2 border rounded-lg text-sm dark:bg-gray-600 admin-filter-input">
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * Realiza a validação da senha administrativa.
         * Senha fixa definida: 1234554321
         */
        function handleAdminLogin() {
            const inputField = document.getElementById('admin-pass');
            if (!inputField) return;
            
            const passVal = String(inputField.value).trim();
            
            // Validação local com a senha solicitada
            if (passVal === "1234554321") {
                state.isAdminAuthenticated = true;
                state.adminAttempts = 0;
                render();
                fetchDataJSONP();
            } else {
                state.adminAttempts++;
                if (state.adminAttempts >= 3) {
                    sendSecurityAlert();
                    state.adminAttempts = 0; // Reseta para permitir novas tentativas ou novo ciclo de alerta
                }
                alert('Senha Incorreta');
                inputField.value = '';
                inputField.focus();
            }
        }

        function renderAdminConsegs() {
            if (state.adminEditingConseg) {
                const c = state.adminEditingConseg;
                const isNew = !c.id;
                return `
                    <div class="p-8 bg-gray-50 dark:bg-gray-700 rounded-3xl border-2 border-primary/30 space-y-6 animate-fade-in shadow-xl">
                        <div class="flex justify-between items-center">
                            <h3 class="text-2xl font-black text-primary uppercase">${isNew ? '✨ Incluir Novo CONSEG' : '✏️ Editando: ' + c.nome}</h3>
                            <button onclick="state.adminEditingConseg = null; render();" class="text-red-500 hover:scale-110 transition-transform font-bold text-2xl">✕</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2 space-y-1">
                                <label class="text-xs font-bold text-gray-400 uppercase">Nome Oficial do CONSEG</label>
                                <input type="text" id="edit-nome" value="${c.nome || ''}" class="w-full p-4 border rounded-xl dark:bg-gray-600 font-bold focus:border-primary outline-none" placeholder="Ex: CONSEG Joinville Leste">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-gray-400 uppercase">E-mail de Contato</label>
                                <input type="email" id="edit-email" value="${c.email || ''}" class="w-full p-4 border rounded-xl dark:bg-gray-600 font-bold focus:border-primary outline-none" placeholder="exemplo@gmail.com">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-gray-400 uppercase">Senha de Acesso</label>
                                <input type="text" id="edit-senha" value="${c.senha || ''}" class="w-full p-4 border rounded-xl dark:bg-gray-600 font-bold focus:ring-2 focus:ring-primary outline-none" placeholder="Senha do Presidente">
                            </div>
                            <div class="md:col-span-2 space-y-1">
                                <label class="text-xs font-bold text-gray-400 uppercase">Agenda / Reuniões</label>
                                <textarea id="edit-agenda" class="w-full p-4 border rounded-xl dark:bg-gray-600 font-bold h-32 focus:ring-2 focus:ring-primary outline-none" placeholder="Local, data e horário das reuniões...">${c.agenda || ''}</textarea>
                            </div>
                            <div class="md:col-span-2 space-y-1">
                                <label class="text-xs font-bold text-gray-400 uppercase">Situação (Ativo no App)</label>
                                <select id="edit-ativo" class="w-full p-4 border rounded-xl dark:bg-gray-700 font-bold focus:ring-2 ring-primary outline-none">
                                    <option value="true" ${c.ativo ? 'selected' : ''}>Sim (Ativo)</option>
                                    <option value="false" ${!c.ativo ? 'selected' : ''}>Não (Inativo)</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex gap-4">

        function handlePresidentLogin() {
            const id = document.getElementById('pres-conseg').value;
            const pass = document.getElementById('pres-pass').value;
            if (!id) { alert("Selecione um CONSEG!"); return; }
            const c = state.consegs.find(con => String(con.id) === String(id));
            if (c && String(c.senha).trim() === String(pass).trim()) {
                state.currentUser = c;
                state.presidentView = 'dashboard';
                state.presidentAttempts = 0; 
                render();
            } else {
                state.presidentAttempts++;
                if (state.presidentAttempts >= 3) {

            }

        function handleSendEmail(id) {

        function saveNewConseg() {
            const nomeVal = document.getElementById('edit-nome').value;
            const emailVal = document.getElementById('edit-email').value;
            const senhaVal = document.getElementById('edit-senha').value;
            const agendaVal = document.getElementById('edit-agenda').value;
            const ativoVal = document.getElementById('edit-ativo').value === 'true';
            if (!nomeVal) { alert("O Nome do CONSEG é obrigatório!"); return; }
            const payload = { id: String(Date.now()), nome: nomeVal, email: emailVal, senha: String(senhaVal).trim(), agenda: agendaVal, ativo: ativoVal };
            state.loading = true; render();
            fetch(DIRECT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_conseg', payload }) })
            .then(() => {
                alert('Novo CONSEG cadastrado com sucesso!');
                state.adminEditingConseg = null;
                return fetchDataJSONP(true);
            }).then(() => render()).catch(() => { alert("Erro ao cadastrar."); state.loading = false; render(); });
        }

            const ativoVal = document.getElementById('edit-ativo').value === 'true';
            const payload = { id: edit.id, nome: nomeVal, email: emailVal, senha: String(senhaVal).trim(), agenda: agendaVal, ativo: ativoVal };
            state.loading = true; render();
            fetch(DIRECT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_conseg', payload }) })

                                    <div class="text-[10px] flex gap-4 text-gray-500">

                                    <span>📅 Registro: ${new Date(r.createdAt).toLocaleString()}</span>

        function resetOuvidoriaForm() {
            state.formConsegId = '';
            state.formSubject = '';
            state.formProcessNumber = '';
            state.formProcessDate = '';
            state.formStatus = 'Aberto';
        }

        async function handleDeleteOuvidoria(id) {
            if (!confirm("Tem certeza que deseja excluir este registro permanentemente?")) return;
            state.registrations = state.registrations.filter(r => String(r.id) !== String(id));
            render();
            try {
                await fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: 'delete_registration', payload: { id } })
                });
            } catch (e) {
                console.error("Erro ao excluir registro:", e);
                fetchDataJSONP(true);
            }
        }

        async function handleSaveNewRegistration(event) {
            if (event) event.preventDefault(); 
            const consegId = document.getElementById('form-conseg').value;
            const subject = document.getElementById('form-subject').value;
            const processNumber = document.getElementById('reg-processNumber').value;
            const processDate = document.getElementById('reg-processDate').value;
            const status = document.getElementById('reg-status').value;
            
            if (!consegId || !subject) {
                alert("Preencha todos os campos obrigatórios (CONSEG e Assunto)!");
                return;
            }

            // Tentar obter a localização antes de salvar
            let latitude = "";
            let longitude = "";

            const getLocation = () => {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        console.warn("Geolocalização não suportada pelo navegador.");
                        resolve(null);
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            });
                        },
                        (error) => {
                            console.warn("Erro ao obter localização:", error.message);
                            resolve(null);
                        },
                        { timeout: 5000, enableHighAccuracy: true }
                    );
                });
            };

            // Mostra um feedback visual simples se demorar
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Obtendo localização...";
            btn.disabled = true;

            const location = await getLocation();
            
            btn.innerText = originalText;
            btn.disabled = false;

            if (location) {
                latitude = String(location.lat);
                longitude = String(location.lng);
            }

            const isUpdate = registroParaEditar !== null;
            const finalId = isUpdate ? registroParaEditar.id : String(Date.now());

            const payload = {
                id: finalId, 
                userName: state.ouvidoriaUser,
                userPassword: state.ouvidoriaPass,
                consegId: consegId,
                subject: subject,
                processNumber: processNumber,
                processDate: processDate,
                status: status,
                createdAt: isUpdate ? registroParaEditar.createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                latitude: latitude, 
                longitude: longitude
            };

            if (isUpdate) {
                const idx = state.registrations.findIndex(r => String(r.id) === String(finalId));
                if (idx !== -1) {
                    state.registrations[idx] = { ...payload };
                }
            } else {
                state.registrations.unshift(payload);
            }

            state.ouvidoriaView = 'list';
            registroParaEditar = null;
            state.ouvidoriaEditingId = null;
            resetOuvidoriaForm();
            render(); 

            const type = isUpdate ? 'update_registration' : 'registration';
            fetch(DIRECT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ type: type, payload: payload }) 
            })
            .then(() => fetchDataJSONP(true))
            .catch((err) => console.error("Erro no salvamento em background:", err));
        }

        function handleOuvidoriaLogin(view) { if (isOuvidoriaValid()) { state.ouvidoriaView = view; render(); fetchDataJSONP(); } }

        function getStatusBadgeClass(status) {
            const s = String(status).toLowerCase();
            if (s === 'aberto' || s === 'pendente') return 'bg-yellow-400 text-black';
            if (s === 'em andamento') return 'bg-blue-600 text-white';
            if (s === 'solucionado') return 'bg-green-600 text-white';
            if (s === 'fechado' || s === 'concluído') return 'bg-gray-500 text-white';
            return 'bg-gray-200 text-gray-700';
        }

                return `

                const start = new Date(state.filterPeriodStart + 'T00:00:00').getTime();
                filtered = filtered.filter(r => new Date(r.createdAt).setHours(0,0,0,0) >= start);
            }
            if (state.filterPeriodEnd) {
                const end = new Date(state.filterPeriodEnd + 'T23:59:59').getTime();
                filtered = filtered.filter(r => new Date(r.createdAt).getTime() <= end);
            }

            filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            window.ultimosRegistros = filtered;
            const filteredIds = filtered.map(r => String(r.id));

            // --- LÓGICA DE CÁLCULO DO RESUMO DE STATUS PARA O ADMIN ---
            const stats = {
                total: filtered.length,
                aberto: filtered.filter(r => r.status === 'Aberto').length,
                andamento: filtered.filter(r => r.status === 'Em andamento').length,
                solucionado: filtered.filter(r => r.status === 'Solucionado').length,
                fechado: filtered.filter(r => r.status === 'Fechado').length
            };

            if (filtered.length === 0) return `
                <div class="space-y-4">
                    <!-- PAINEL DE RESUMO COM BADGES COLORIDOS -->
                    <div class="flex flex-wrap gap-2 mb-2 animate-fade-in">
                        <div class="bg-blue-100 text-blue-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Total: ${stats.total}</div>

                        <div class="bg-yellow-100 text-yellow-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Andamento: ${stats.andamento}</div>
                        <div class="bg-green-100 text-green-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Solucionado: ${stats.solucionado}</div>
                        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1 text-[10px] font-bold shadow-sm">Fechado: ${stats.fechado}</div>
                    </div>
                    <p class="bg-blue-100 text-blue-800 p-2 rounded-lg text-center font-bold text-xs uppercase tracking-wide">Total: 0 registros encontrados</p>
                    <p class="text-center py-10 font-bold text-gray-500">Nenhum registro encontrado no sistema.</p>

                        <button onclick="window.handleDeleteAdminFiltered('${filteredIds.join(',')}')" class="w-full sm:w-auto bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-red-700 shadow transition-all admin-filter-input flex items-center justify-center gap-2">
                            🗑️ Excluir todos os ${filtered.length} registros filtrados
                        </button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${filtered.map(r => {
                            try {
                                return `
                                    <div class="bg-white dark:bg-gray-700 p-5 rounded-2xl border-l-8 ${getStatusBorderClass(r.status)} shadow-md transition-all duration-300 relative">
                                        <div class="flex flex-col gap-1 pr-14">

                                                <span class="${getStatusBadgeClass(r.status)} px-2 py-1 rounded text-[10px] font-bold uppercase tracking-tight">${r.status}</span>
                                                ${r.processNumber ? `
                                                    <span class="font-extrabold text-sm text-primary dark:text-blue-400">
                                                        Proc: ${r.processNumber} ${r.processDate ? '(' + new Date(r.processDate).toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' }) + ')' : ''}
                                                    </span>
                                                ` : ''}
                                            </div>
                                            <p class="font-extrabold text-gray-800 dark:text-gray-100 text-base">${r.userName || 'Usuário'} <span class="text-[10px] text-gray-400 font-normal">(${state.consegs.find(c => String(c.id) === String(r.consegId))?.nome || 'Sem CONSEG'})</span></p>

                                        </div>

        function getStatusBorderClass(status) { if (status === 'Pendente' || status === 'Aberto') return 'status-border-pendente'; if (status === 'Em andamento' || status === 'Em Andamento') return 'status-border-andamento'; if (status === 'Concluído' || status === 'Solucionado' || status === 'Fechado') return 'status-border-concluido'; return 'border-gray-300'; }

        window.handleDeleteAdminIndividual = async function(id) {
            if (!confirm('Deseja realmente excluir este registro?')) return;

            try {
                await fetch(DIRECT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ type: 'delete_registration', payload: { id: id } })
                });
            } catch (e) {
                console.error(e);
                fetchDataJSONP(true);
            }
        };

        window.handleDeleteAdminFiltered = async function(idsString) {
            const ids = idsString.split(',');
            if (ids.length === 0 || ids[0] === "") return;
            if (!confirm(`VOCÊ ESTÁ PRESTES A EXCLUIR TODOS OS ${ids.length} REGISTROS FILTRADOS. Confirma?`)) return;
            if (!confirm(`ESSA AÇÃO É IRREVERSÍVEL. Confirmar exclusão em massa?`)) return;
            state.registrations = state.registrations.filter(r => !ids.includes(String(r.id)));
            render();
            for (const id of ids) {
                try {
                    fetch(DIRECT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ type: 'delete_registration', payload: { id: id } })
                    });
                } catch (e) {}
            }
            setTimeout(() => fetchDataJSONP(true), 1000);
        };

        setInterval(() => { state.currentTime = new Date(); if (state.screen === 'home') render(); }, 60000);
        setInterval(() => fetchDataJSONP(), 120000);
        fetchAppVersion();
        fetchDataJSONP(); render();

        window.showRegistrationDetails = function(id) {
            const r = state.registrations.find(reg => String(reg.id) === String(id));
            if (r) {
                alert(`DETALHES DO REGISTRO\n\nStatus: ${r.status}\nData: ${new Date(r.createdAt).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}\nUsuário: ${r.userName}\nAssunto: ${r.subject}\n\nProcesso: ${r.processNumber || 'N/A'}`);
            }
        };

        window.handlePresidentUpdateStatus = async function(id, newStatus) {
            const reg = state.registrations.find(r => String(r.id) === String(id));
            if (!reg) return;
            
            const oldStatus = reg.status;
            reg.status = newStatus;
            reg.updatedAt = new Date().toISOString();
            render();
            
            try {
                const response = await fetch(DIRECT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        type: 'update_registration', 
                        payload: reg 
                    })
                });
                // Como é no-cors ou similar, podemos não ter resposta legível, mas o comando foi enviado.
            } catch (e) {
                console.error("Erro ao atualizar status pelo presidente:", e);
                alert("Erro ao sincronizar alteração. Tentando recuperar...");
                fetchDataJSONP(true);
            }
        };

        window.abrirEdicaoOuvidoria = function(id) {
          const reg = state.registrations.find(r => String(r.id) === String(id));
          if (!reg) return;
          registroParaEditar = reg; 
          state.ouvidoriaView = 'form';
          state.ouvidoriaEditingId = id; 
          if (state.screen === 'admin') {
              state.ouvidoriaUser = reg.userName;
              state.ouvidoriaPass = reg.userPassword;
          }
          render();
          let tentativas = 0;
          const checkExist = setInterval(function() {
            const campoAssunto = document.getElementById('form-subject');
            if (campoAssunto) {
              campoAssunto.value = reg.subject || '';
              const procNum = document.getElementById('reg-processNumber');
              const procDate = document.getElementById('reg-processDate');
              const statusField = document.getElementById('reg-status');
              const consegField = document.getElementById('form-conseg');
              if (procNum) procNum.value = reg.processNumber || '';
              if (procDate) procDate.value = reg.processDate || '';
              if (statusField) statusField.value = reg.status || 'Aberto';
              if (consegField) consegField.value = reg.consegId || '';
              if(reg.processNumber) {
                  const container = document.getElementById('reg-date-container');
                  if (container) container.style.display = 'block';
              }
              clearInterval(checkExist);
            }
            if (++tentativas > 20) clearInterval(checkExist);
          }, 100);
        };
    </script>
